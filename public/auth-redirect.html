<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentification VS Code - Nexora</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        h1 {
            color: white;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .divider {
            width: 60px;
            height: 4px;
            background: #8b5cf6;
            margin: 0 auto 30px;
            border-radius: 2px;
        }
        
        .status {
            margin-bottom: 30px;
        }
        
        .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid #8b5cf6;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .message {
            color: #d1d5db;
            font-size: 16px;
            margin-bottom: 20px;
        }
        
        .success-icon {
            width: 32px;
            height: 32px;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        
        .error-icon {
            width: 32px;
            height: 32px;
            background: #ef4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        
        .success-message {
            color: #10b981;
            font-weight: 500;
        }
        
        .error-message {
            color: #ef4444;
            font-weight: 500;
        }
        
        .retry-btn {
            background: #8b5cf6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 20px;
        }
        
        .retry-btn:hover {
            background: #7c3aed;
        }
        
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #9ca3af;
            font-size: 14px;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Authentification VS Code</h1>
        <div class="divider"></div>
        
        <!-- État de chargement -->
        <div id="loading-state" class="status">
            <div class="spinner"></div>
            <p class="message" id="loading-message">Initialisation...</p>
        </div>
        
        <!-- État de succès -->
        <div id="success-state" class="status hidden">
            <div class="success-icon">✓</div>
            <p class="success-message" id="success-message">Authentification réussie!</p>
            <p class="message">Si VS Code ne s'ouvre pas automatiquement, vous pouvez fermer cette fenêtre.</p>
        </div>
        
        <!-- État d'erreur -->
        <div id="error-state" class="status hidden">
            <div class="error-icon">✕</div>
            <p class="error-message" id="error-message">Erreur d'authentification</p>
            <button class="retry-btn" onclick="window.location.reload()">Réessayer</button>
        </div>
        
        <div class="footer">
            Nexora - Extension VS Code
        </div>
    </div>

    <script>
        // Fonction pour afficher un état
        function showState(state) {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('success-state').classList.add('hidden');
            document.getElementById('error-state').classList.add('hidden');
            document.getElementById(state + '-state').classList.remove('hidden');
        }
        
        // Fonction pour mettre à jour le message de chargement
        function updateLoadingMessage(message) {
            document.getElementById('loading-message').textContent = message;
        }
        
        // Fonction pour afficher une erreur
        function showError(message) {
            document.getElementById('error-message').textContent = message;
            showState('error');
        }
        
        // Fonction pour afficher le succès
        function showSuccess(message) {
            document.getElementById('success-message').textContent = message;
            showState('success');
        }
        
        // Fonction principale d'authentification
        async function handleAuth() {
            try {
                updateLoadingMessage('Vérification des paramètres...');
                
                // Récupérer les paramètres URL
                const urlParams = new URLSearchParams(window.location.search);
                const state = urlParams.get('state');
                const error = urlParams.get('error');
                
                if (error) {
                    showError(`Erreur d'authentification: ${error}`);
                    return;
                }
                
                updateLoadingMessage('Vérification de la session...');
                
                // Vérifier si l'utilisateur est connecté via Supabase
                const supabaseUrl = 'https://dgrrkeugniijfhagmplm.supabase.co';
                const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRncnJrZXVnbmlpamZoYWdtcGxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzODkxODMsImV4cCI6MjA4OTk2NTE4M30.pbG93LZ4MPQR1dIAq2tyIAG1nfgScrSJHBsajYC0lLc';
                
                const authResponse = await fetch(`${supabaseUrl}/auth/v1/user`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('supabase.auth.token') || sessionStorage.getItem('supabase.auth.token')}`,
                        'apikey': supabaseKey
                    }
                });
                
                if (!authResponse.ok) {
                    updateLoadingMessage('Redirection vers la connexion...');
                    setTimeout(() => {
                        const loginUrl = `/auth/login?redirect=${encodeURIComponent(window.location.href)}`;
                        window.location.href = loginUrl;
                    }, 1000);
                    return;
                }
                
                const userData = await authResponse.json();
                
                if (!userData || !userData.id) {
                    updateLoadingMessage('Redirection vers la connexion...');
                    setTimeout(() => {
                        const loginUrl = `/auth/login?redirect=${encodeURIComponent(window.location.href)}`;
                        window.location.href = loginUrl;
                    }, 1000);
                    return;
                }
                
                updateLoadingMessage('Génération du code d\'authentification...');
                
                // Générer le code d'authentification
                const codeResponse = await fetch('/api/auth/generate-auth-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: userData.id, state })
                });
                
                const codeData = await codeResponse.json();
                
                if (!codeResponse.ok || !codeData.success) {
                    showError(codeData.error || 'Erreur lors de la génération du code');
                    return;
                }
                
                showSuccess('Authentification réussie! Redirection vers VS Code...');
                
                // Rediriger vers VS Code
                const vscodeUrl = new URL('vscode://Nexora.nexora/auth');
                vscodeUrl.searchParams.set('code', codeData.code);
                if (state) vscodeUrl.searchParams.set('state', state);
                
                setTimeout(() => {
                    window.location.href = vscodeUrl.toString();
                }, 2000);
                
            } catch (err) {
                console.error('Auth error:', err);
                showError('Erreur inattendue lors de l\'authentification');
            }
        }
        
        // Démarrer l'authentification après un délai
        setTimeout(handleAuth, 500);
    </script>
</body>
</html>
